services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: wanderguard
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wanderguard"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /tmp:/tmp
      - ./secrets:/secrets:ro
    # `up` 走這條（會跑 migration + bootstrap dump + uvicorn）；
    # `run --rm backend python ...` 會用 args 覆蓋此 command，bootstrap 不會跑。
    command: ["bash", "/app/scripts/start.sh"]

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
